storage:
    dbPath: /data/db/

systemLog:
    destination: file
    logAppend: true
    path: /var/log/mongodb/mongod.log
net:
    port: 27017
    bindIp: 0.0.0.0
    unixDomainSocket:
        enabled: true
        pathPrefix: /socket
        filePermissions: 0770

processManagement:
    timeZoneInfo: /usr/share/zoneinfo
